# ══════════════════════════════════════════════════════════
# BharatDefence.site — GitHub Actions Auto-Publisher
# FILE LOCATION IN YOUR REPO: .github/workflows/autopost.yml
#
# Runs FREE on GitHub servers 4x daily
# Pushes new articles → Vercel auto-deploys in ~15 seconds
# ══════════════════════════════════════════════════════════

name: BharatDefence Auto-Publish

on:
  schedule:
    # All times UTC — IST is UTC+5:30
    # 06:00 AM IST = 00:30 UTC
    - cron: '30 0 * * *'
    # 12:00 PM IST = 06:30 UTC
    - cron: '30 6 * * *'
    # 06:00 PM IST = 12:30 UTC
    - cron: '30 12 * * *'
    # 11:00 PM IST = 17:30 UTC
    - cron: '30 17 * * *'

  # Run manually anytime from GitHub → Actions tab
  workflow_dispatch:

jobs:
  autopost:
    name: Generate & Publish Articles
    runs-on: ubuntu-latest
    concurrency:
      group: bharatdefence-autopost
      cancel-in-progress: false

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: automation/package.json

      - name: Install dependencies
        working-directory: automation
        run: npm ci

      - name: Run AI article engine
        working-directory: automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_KEY:   ${{ secrets.UNSPLASH_KEY }}
          NEWS_API_KEY:   ${{ secrets.NEWS_API_KEY }}
          SITE_DOMAIN:    ${{ secrets.SITE_DOMAIN }}
        run: node autopost.js

      - name: Commit new articles to GitHub
        run: |
          git config --local user.email "autobot@bharatdefence.site"
          git config --local user.name "BharatDefence AutoBot"
          git add site/articles/ site/sitemap.xml
          git diff --staged --quiet && echo "No new articles generated" || \
          git commit -m "🤖 Auto-publish $(date +'%d %b %Y %H:%M IST') — $(find site/articles -name 'index.html' | wc -l) articles total"

      - name: Push to GitHub → triggers Vercel deploy
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Ping Google with updated sitemap
        run: |
          sleep 20
          curl -s "https://www.google.com/ping?sitemap=https://bharatdefence.site/sitemap.xml" || true

      - name: Done
        run: |
          echo "✅ BharatDefence Auto-Publish Complete"
          echo "Time: $(date +'%Y-%m-%d %H:%M UTC')"
          echo "Vercel deploy triggered by git push"

